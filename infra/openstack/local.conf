[[local|localrc]]
# =============================================================================
# DevStack local.conf — TechNova BV Leeromgeving
# Bestand: /opt/stack/devstack/local.conf
#
# INSTRUCTIES:
# 1. Kopieer dit bestand naar /opt/stack/devstack/local.conf op de DevStack VM
# 2. Pas HOST_IP aan naar het IP van jouw DevStack VM
# 3. Pas wachtwoorden aan indien gewenst (maar houd ze consistent)
# 4. Voer uit: sudo -u stack /opt/stack/devstack/stack.sh
#
# Installatie duurt 30-60 minuten. Zorg voor stabiele internetverbinding.
# =============================================================================

# ─── Wachtwoorden ────────────────────────────────────────────────────────────
# Gebruik dezelfde wachtwoorden voor alle services.
# PAS DIT AAN indien je een ander beheerderswachtwoord wil.
ADMIN_PASSWORD=TechNova2024!
DATABASE_PASSWORD=TechNova2024!
RABBIT_PASSWORD=TechNova2024!
SERVICE_PASSWORD=TechNova2024!

# ─── Netwerk ─────────────────────────────────────────────────────────────────
# HOST_IP: IP-adres van deze DevStack VM
# Pas aan naar jouw IP-adresplan
HOST_IP=192.168.100.20

# Intern netwerk voor VM's binnen OpenStack
FIXED_RANGE=10.11.12.0/24
FIXED_NETWORK_SIZE=256
FLAT_INTERFACE=ens18          # Pas aan naar jouw interface (check: ip link show)

# Floating IPs (extern bereikbaar voor VM's)
# Kies een range die NIET overlapt met andere hosts in jouw netwerk
FLOATING_RANGE=192.168.100.128/26
PUBLIC_NETWORK_GATEWAY=192.168.100.1
PUBLIC_INTERFACE=ens18        # Pas aan naar jouw interface

# ─── Services activeren ──────────────────────────────────────────────────────
# Core services (verplicht)
enable_service n-api
enable_service n-cpu
enable_service n-cond
enable_service n-sch
enable_service n-novnc
enable_service n-cauth

# Placement API (verplicht voor moderne Nova)
enable_service placement-api
enable_service placement-client

# Glance (images)
enable_service g-api
enable_service g-reg

# Horizon (webdashboard) — studenten gebruiken dit
enable_service horizon

# Neutron (netwerk) — voor VM networking
enable_service q-svc
enable_service q-agt
enable_service q-dhcp
enable_service q-l3
enable_service q-meta
enable_service q-metering
disable_service n-net        # Gebruik Neutron, niet legacy nova-network

# Keystone (authenticatie)
enable_service key

# Cinder uitschakelen (volume storage) — niet nodig voor leeromgeving
disable_service cinder
disable_service c-api
disable_service c-vol
disable_service c-sch

# Swift uitschakelen (object storage) — niet nodig
disable_service swift
disable_service s-proxy
disable_service s-object
disable_service s-container
disable_service s-account

# Heat uitschakelen (orchestration) — te complex voor dit niveau
disable_service heat
disable_service h-api
disable_service h-eng

# Tempest uitschakelen (tests) — niet nodig voor leeromgeving
disable_service tempest

# ─── Branch/Versie ───────────────────────────────────────────────────────────
# Gebruik de stabiele branch passend bij Ubuntu 22.04
# Verander dit NIET tenzij je weet wat je doet
# BRANCH_NAME=stable/2024.1

# ─── Logging ─────────────────────────────────────────────────────────────────
LOGFILE=/opt/stack/logs/stack.sh.log
LOGDAYS=3
VERBOSE=True
LOG_COLOR=True

# ─── Database ────────────────────────────────────────────────────────────────
# MySQL als database backend (stabielst voor DevStack)
enable_service mysql

# ─── Overige instellingen ─────────────────────────────────────────────────────
# Horizon tijdzone instellen (voor weergave in dashboard)
HORIZON_TIMEZONE=Europe/Amsterdam

# Nova VNC console
NOVNCPROXY_URL=http://192.168.100.20:6080/vnc_auto.html

# API rate limiting uitschakelen (voor onderwijsomgeving handig)
API_RATE_LIMIT=False

# Automatisch standaard netwerken aanmaken
NEUTRON_CREATE_INITIAL_NETWORKS=True
